body:
  text: 卷二占房一緒論論曰臨月先須事審診預辨順逆凡妊娠之狀以手按之腹中若有界埒其上張大而下狹小者為順孕即以手按橫骨上其子頭陷在橫骨中矣其下張大而上狹小者為逆孕即以手按橫骨上其上際虛疏可容兩指則知難産也如其胎偏側而頭入右股者不治則知橫産也凡出生之兒自頂至尾骶長不盈一尺者必死縱無災害復不能育也如工匠尺准之者八寸凡臨産之脈宜浮數弦大産難脈亦貴按之而有力者世傳欲産之婦脈離經然此與難經所云一呼一至曰離經者義又似各別餘數驗諸臨産之婦其脈形真可心當離經之目者數千人中偶得一二人凡産事極易者其破漿之後脈或左右或左或右必沉細而滑其子方免寸口皆離絶而入於指端既則復於本位矣疑乃謂此也有痛五七日而免者其痛日下至腰或有痛乍起乍止而免者其疼俄止者慮子死腹中可也臨産宜顏色青白其赤者危其生也彼之時也其豈草根木皮之所能催哉故世言催生藥者妄矣但臨産之婦服藥助其血氣則或有是理子戶既開漿破血下漿者包膜中水其色清冷而黏類雞子白蓋內氣剛逼而繞壓其胎故包膜中水先所束迫而並聚於子頭頂上而內氣益摶手及産門則頭膜不復堪停積而自迸裂也其水或五六度下者乃膀胱之餘泄而非膜中之水也凡破漿不來而産者被幕胎也破漿來不迸者倒産也如臨産而小便利者子頭不在於橫骨中也非橫逆産則是其子已死於腹中矣故小便不通者為子易免産矣然而死胎亦時有小便不通者醫宜臨時審候之也凡臨産下水不止者為胎死之候然醫探之其子頭上微有動氣瞤瞤應於其指者猶為生胎如死胎則無動氣應於指者凡痛在腰甚者為正産如初産婦痛只在腹而不下於腰及肛門者非橫逆産則是其子死於腹中矣凡臨産子將免即腰痛已止而肛門大痛或有挺出者坐草術詳之産婦力息及子將免則重沓而倍至其聲息後倍振大而産母每俯者為生胎矣聲息後卻細微而産母每仰者為死胎凡胎死者按腹無氣力而指若將陷矣診脈無力而形若將結矣腰骨之橫而當臍下者謂之橫骨橫骨之餘曲而下趨迤會於股中者謂之交骨其交沖中間相距者男子三分婦人五分余經産者一寸余是謂會陰交骨之前為陰交骨之後為肛門入陰四寸當肛門之上子宮位焉子宮長八寸其口常向背後而橫骨之下邊正當其口故及子將免也子宮轉其口而反向交骨全闢而陰肉皆沒會陰近於上而穀道後張故子已出子宮則其頭頂直下倒豎於會陰而及激轉跳脫出産戶即免矣子宮之形大類曲腰匏而子已落地則其口捲縮卻退入者四寸余而復於本位矣子頭頂未出於子宮者雖經二日而未死已出二寸余難免者必死為其卷口閉塞其口鼻故也臨産子未免而胞衣先下者定為其胎已死矣凡將分娩之時兒欲生而不生産母亦力息數至而不可下者有燥屎塞之也探之其陰中近肛門有物堅實如石而礙其指背即燥屎也蓋以子頭壓之燥屎向前故其産門脹痛益甚當急用蜜塗指入肛門導之大便得通則輒免矣平日苦祕結之人必多有此事不可不知也世之論産率以謂子轉身乃生而終不知其未嘗轉身也是以一切橫礙偏倒之産皆不知求其過於妊娠之初而一歸其罪於産婆之巧拙與用藥之遲速豈非可嘆息之甚乎故如逆産或露一足者尚或可得救之而至如橫産露手者乃以元束鎮帶制之令偏故其歪斜已甚者醫雖急按之而或不遽順直則兒胎必不得不死兒胎已死則母亦不可獨得活但當不得已而剁去之則或可得救之耳此吾之所以極嘆息也産母坐草不可太早必待其力息重沓而倍至一兩次而後坐之也不然則恐令産母體氣先倦而免後失力也又切不可令産婦努力也産母力息既亟陽氣全結並聚於上然後子乃乘其勢下挺而生故初生落地其肌極冷其色甚白撫之如水才舉一聲則四體即溫肌色成赤其愈冷愈健若未啼其肌已溫者率不逾三日而死兒在腹中肌骨極柔軟蓋分娩之際雖頭顱亦壓匾而出及落地則忽然復形但如世所傳落地見風則暴長者非是也兒在腹中順逆皆背面及出産戶男子必俯女子臨出必側戾而轉既落地則仰肚帶短者一尺長者三四匝者然未知其何以也但世謂妊娠嘗顛躓者而後有此者妄耳蓋數見免産其繞頸十七八豈天下妊婦皆嘗顛躓乎即如楊子建所言礙産者以今推之乃亦燥屎塞之爾耳不然余未見天下有以臍帶絆其肩而為之礙産者也盤腸産者穩婆不知其宜強令努力故脫其腸也其産後腸脫亦強努力出胞衣故也其産前腸脫者以指推之收諸産門上邊令免産焉二治法病候曰産婦嘔吐不止氣上衝心者不治測法曰子死也病候曰露手而及臂若膊者不治測法曰子必不能免而死病候曰腸脫若肛脫若子宮脫治法曰見後病候曰臨産不堪腰痛者治法見於後坐草術病候曰交骨不開者測法曰子宮能轉口則交骨必無不開之理其有不開者以子未臨而強令努力故子橫冒子宮而出令其口反益深也病候曰分娩陰裂者測法曰産婆之誤也凡佐産者當取諸上邊而不可取諸下邊下邊肉脆子頤骨觸之必無不破生肌完膚散主之生肌完膚散方大蒜百錢燒存其性輕粉十一錢莽草五錢陰乾燒之為灰上三味以胡麻油調之塗其瘡上甚有神效病候曰臨産燥屎害於産道者治法曰見於論條蜜若膠飴輩治之無則諸膏油皆可也病候曰産不能自免者治法曰先與參附之類凡産難延日若胎死見背若見臂膊之類必致令産母斃不可不早時決意而救之也其法醫踞小几令産母安意解帶倚蓐高枕開股豎膝腳底撐幾而仰臥醫亦展兩腳腳尖承産母之兩臂以其股間倚産母之兩膝令不外倒而後施其事焉可也病候曰子已露半身尚不能出者測法曰子腰已下甚大也又有腳股已下甚大如巨柱者凡此類多死胎死則不復能自免醫必當有術救之也余治産婦罕見此二種然數萬人僅一二其産母皆因余救之而得不死特識於此以備後案云病候曰臨産破漿後猶下水不止者測法曰子死腹中也如子雖已死而不見下水者子頭塞橫骨之中也其母必腹若股髀腫滿凡子已死三日則其頭腦率多自三裂焉治法曰回生術主之三治術治術曰夫妊娠之治莫要於臨産而其間救護居十八而湯藥居其二焉故救護失術則湯藥無效矣然乃今之醫徒論湯藥之性而不知講救護之術至其産母坐草起居之宜與生子臨盆死生之候一任之産婆漫然不加省即遇其稍危難者瞪然疑阻坐視其子母兩斃此豈救患濟生者之所為乎且夫世所有産婆者並皆孤嫠寡嫗之不得已為業者乃無知之一女子而徒知滌浴拂拭之事而已豈足與謀死生決成否哉故救護之術之於妊娠之治也不可不講者明矣其術五一曰坐草二曰抒倒三曰整橫四曰舉孿五曰回生坐草曰將分娩疼痛者當使人以手常上下抑按其腰八髎冗以下而為之不休既而其痛稍下頻欲大便則令之解衣坐草其坐法亦宜分開足踵全出尻外而坐是時醫先坐産婦之前令其兩手憑肩嬰項以舉體倚任之而醫於是當以右手裹綿衣進自婦股間以其腕骨抵承婦之尾骶骨而使坐之而其左手抱持婦每陳疼至即以右手昂按迎起而左手緊抱舉上之已得陳疼一再至後則當先去其綿衣以食中兩指入陰探之以候其胎橫逆與否其法當先向肛門而入指頭卻轉向上探之是時子宮口尚內斂兒在其中而頭尚冒膜探之若濡帛者即膜也如出宮者則口已張開而子亦出頂雖尚冒膜指頭易探即未出子宮者其膜中水漿飽滿欲迸未迸使産婦腰股痛殆如裂醫當待其張時爪破之水泄氣達則其痛減半母氣已旺則出娩益易也胞水已泄乃為免産之候醫當自踞小几以左右膝頭緊挾婦之小腹使子胎無地欹側仍又右手昂按左手舉上如前法蓋子出子宮輒已直下其頭頂倒撐産母會陰而穀道挺出眼中火出痛極脈移則激轉跳脫而得出於産戶故世間産婦有因分娩致陰門下裂者亦以其激轉脫出之時産婆不加意按其肛門之過也是故右手之昂按之者尤為坐草之緊要矣不可不審慎用其意也其左手舉上之法亦當要每舉上必使産母下肚與醫人之肩膊相摩切微帶壓推之意前法或又用使産婆在産母背後按拒其穀道無挺出醫在前兩膝挾小腹用兩手撐側骨自小腹逼勒起頻頻為之而相湊於神闕上而候子已及肛門急使産婆疾以兩手指互編相連自背後承産婦之下肛以腹抵當而微舉提之則殊易達生也但疼痛甚者唯當用昂按其二抒倒曰探之子宮中得子足踵者醫先以手推入之仍使婦倚蓐高枕開股仰臥而後重捫其足大指審知是左是右得左足者卻更索其右足得右足者卻索其左足既齊得之則以其手中指兩股間而各挾捉其左右足令無所滑脫而後醫自聳其腰據膝頭用力急引提而拔之即陰戶不傷而得免産矣如或醫未至前子已露足産婆亦已不能推入之而至使露膝若股髀者則不得復索其左右而齊之蓋緩之則産母不勝痛苦尋必致斃且其子亦難活者必矣唯當急以綿衣裹之而聳腰引提各從其方拔之如前法則其一邊之腳自隨之奮挺而出急用此法者子母或俱全若遲緩不決或又不知其倒産初不可使轉生者也則必因此事致子母兩斃懊悔無及矣如又如前法引拔之而子已係死胎項骨更拒留於橫骨間者當令婦俯首就地開股蒲伏而綿衣裹兒左手緊捉牽持而以右手大拇指不拘是頸是喉疾撲而下之左手就勢齊時聳腰引拔即得免産凡此類並不可使其子沿陰門下邊而拔之必令陰門下裂當向陰門上邊而引拔之則無所傷裂所以必用聳腰也又有探之得子臀尻者名曰坐産當推入之後按腹使其展腳而後捉拔之如已死胎則依回生術救之其三整橫曰探子宮中得手指若子元曲肱而肘見者醫先以手推入之仍令婦高枕而開股仰臥而後左手入子宮按拒其所露手指若臂頭而右手就其婦之左邊小腹捫得其胎用力推上之務令順正則子即正生焉其四舉孿曰除雙逆外孿胎皆可得令免産唯駢首向下者探之令其頭少退者卻在後而其頭少進者先出焉其法兩手各就婦之小腹而其應使在後者自橫骨際推而上之應使先出者自小腹上推而下之則易免矣但其婦亦須高枕仰臥如前法而其應使後出者之所位就令婦身差帶微側而臥尤為易得施功也其孿胎一順一逆者亦各照前手法用之而免焉如駢首向下者而胎已死於腹中分行而並下其頭各入兩股急難相湊至者其法與生胎駢首同其五回生曰凡橫産露手已及臂肘若膊者不唯其子不可得兔而母亦必因之致斃如子未出而死於腹中者亦然於是有茲一術有微意難以筆授雖然余常驟用此救人之橫災挽回周全殆以千數唯弟子輩亦有一二繼之者焉云
