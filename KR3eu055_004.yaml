body:
  text: 卷四産椅論我邦近世婦人大産之後必用産椅椅制不一而大抵皆後面有倚左右有牆而前小橫板及底面皆可抽換産婦已下胞衣則椅中周圍先置疊被板牆上亦皆覆以綿被而後使婦人自起步就椅中而其坐必令端然跪坐始産七晝夜又不許睡而俯首於是代設看視相守達旦少有偏側叱令改之一七日而始才免此苦楚矣而今俗上自天子后妃下達士庶妻妾皆莫不甘受是嚴責而幸免乎斯苦者山野海濱樵婦漁姑之屬耳然余考漢人醫治産後者其將調法或止言須臾上床宜仰臥不宜側臥宜豎膝未可伸足高倚床頭之類而未嘗聞其有産椅之制也又嘗求之本邦舊俗雖書傳散佚不可詳考而嘗閲空穗語載某姬産後三日輒起而人勸使之臥寢之事則其書雖寓言當時無産椅者可徵焉意其蓋起於晚近苟且之制久之漸漬人不覺其害也椅之害産後者大抵有八産後腹內大空惡露淤蓄熱氣尤盛一有起身必動胃府之積聚與熱氣極搏因以跳動移觸任脈則雖健婦必發血暈今將起就産椅因必成此症其害一也新産所恐者崩漏脫血率由跪坐不臥而急發此症而産椅必當跪坐其害二也脫血急救或可挽回而坐産椅者則四面牆板為之扞格難得施展往往稽遲致不可救其害三也虛羸尫弱之婦産後營血大虛強使跪坐氣血留澀筋脈不仁其因為痿躄者往往有之其害四也新産防其睡俯首甚嚴是勞力後尚不使安神就寢也欲血氣不耗消豈可得乎此必是他日血癆不起之基矣其害五也不得安神就寢則血氣數躁必因致經脈留熱惡露難下其害六也産婦必穀道挺出今跪坐則難得斂去瘀熱因流淫決成脫肛痔漏其害七也一用産椅則必用看守之人令終夜忍睡而相視則食藥之類必易致不謹其害八也有此八害而世不知議其可廢者何乎曰因循而已苟且而已往往因以致人家婦女無病而斃豈不可哀之甚邪蓋余少時在田間見産婦皆能娩後二日輒能起行與平日無異也及來京師則見貴賤産婦皆非經七八日則不能行步矣因知並皆産椅之所害也爾後每治産婦必力絀其産椅唯高枕蓐臥而已故雖閨閣嬌養之質次日則已可行數里而橫難困極之餘必亦莫致疲弊而易起矣人往往謂我奇術而非術之奇也實不用産椅故耳故今特著此論敢告一世幸有能者為審利害益為明論他日或見人家有産椅者請皆毀拆燔滅之而無使貽是禍於橫目之間是豫所望後來濟世者鎮帶論本邦婦人妊娠五月必以綿線作帶束於胸下曰以鎮胎氣使不上衝也蓋方今此風乃已遍於四方遐陬相傳昔神功皇后徵三韓時方有身而被鎧鎧不能合因作此帶束之既凱旋而誕應神天皇竟無災害升平富樂鎮帶之制創起於此而後世婦人欽慕而仿云然余自少壯學醫多治妊婦見其受鎮帶之害者尤甚也因竊疑以為神聖所傳之道豈固若斯乎考之國史帝記莫言此帶者而獨於元永寵姬懷孕之事始見著帶之文及閲東鑑載源大將軍夫人妊娠五月其諸臣進帶其儀節甚詳即知鎮帶之説雖本附會亦自中古矣後又閲明醫陳朝階奚囊便方其中有用軟絹帛纏腹之法則知彼亦有與我鎮帶意相類者矣然余以所見彼並皆庸俗之論耳夫天地以至仁為其德以生生為其化矣試觀竹之生於宇下者拔地數寸必自屈曲生節預避其宇以達焉是可心觀天地好生之德焉矣又試觀盤石之底土蓄草根者其石不移則雖萬年不發動及一轉石也勃焉萌動焉是又可以察天地發生之機焉矣見故天地發生之機未嘗動於其不可之地矣天地至仁之德未嘗有不擇其地而行之以反害其生矣産育之事乃發生之大端其理亦何異之有母氣既可任産育故已自能孕其生則雖微護防而無異故者決矣是故禽獸草木胎孕含苞未嘗假夫鎮帶之施設也今謂人不與此同者惑之甚也是故鎮帶之設亦所謂混沌之鑿也耳且兒胎既倒首居中又決無其氣上逆之理而今循庸俗之陋習不察其非強用鎮帶則彼包膜惡血蓋於兒胎臀尻而正當母胸前者常為此帶所緊縛積久底著滯結成症乃臨産不患胞帶難下即産後或發崩漏若血癆之危症矣且雖在其懷孕之時帶常緊縛其肚則母身每動胎不能副其運轉之變是乃制其上而戾其下也欲子胎之不歪側豈可得乎子胎一側則百禍之大本起於此矣然則鎮帶不唯無其益而反有其害豈可不深懼哉是故余常見用此帶者必諭以其故務去其帶而以免踏危機者居十之九矣但以其習俗已久而雖可嚀告戒聞者率信疑相半及見其功效者乃始豁然矣嗟乎天下殷乎盛矣我軀眇乎小矣一生之所能救者幾何人哉誰能繼豫論以遍告之天下之民百世之後者則請以豫之緒言更助其理之暢茂也蓋曰譬如樹藝者已植已培已澆已安之後人須棄之如忘者則其木之茁長者挺然而直且美矣若或日從而撼其樹叩其根矯其技摘其葉則其不尫然而瘦僵然而枯者幾希矣夫産育之理亦何異於此矣是故凡物類夫矯摘之意者皆奪其肥腴而速其僵枯之為也耳則不啻一鎮帶云
