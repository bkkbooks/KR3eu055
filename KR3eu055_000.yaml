body:
  text: 附録子玄子治驗四十八則子玄先生以方術特善治産婦擅名於京師者已三十年都人士庶迎請懇治歲以萬數其間神效奇勳豈可勝記哉茲請諸門人所嘗劄記僅抄其一二頗存概略者庶論言實行足以相徵發焉云爾門人山脅格識一婦初産甚難尋孕七月時下血恐復不育也乃請子診子問其所以朝夕曰未嘗弛鎮帶寢則繩約頸膝子曰是所以動其血也欲得我治則皆反乎是其姑同坐而色疑阻子因謝去既已其血下日多其鄰有知子日夜更勸令殷請於是子復往則刀斷其繩帶棄之其明日而血止遂育一婦産後暈招子至則旁坐一醫子心欲去其鎮帶因問之帶何出曰某書曰可去乎曰不可子因謂曰請居亦知去之可矣暈既止醫遂逃一婦産後右腳縮者八寸三年復孕懼而迎子子謂曰欲我治則無帶與椅矣且免後忍大痛則令足復長子去其族甚勸之曰必不妄也遂治其免也已下胞而子到令去其帶左側臥而為按蹻及八日腳伸者六寸有半矣一富室妻産後暈不止子聞急趨之醫輿先至者三人既見子色皆倨坐列火爐十枚以醋澆炭呼大噪子曰暈曙達子夜不可粥者危矣公等何坐視之無計乎且何徒用是臭為皆應曰即止之君功也子諾而入去鎮而按則止矣去椅而蓐則食矣出欲語則已逃矣一婦産後子宮脫長尺許大如柱有一坐婆以為雙胎引而出之者又五寸許三日不入子往輒為入之以其無所痛也次日能起步矣一婦産後血迷皆忘其昆弟獨識其母與以折衝飲十日而復有人迎子治其婦子至其門聞其呻吟聲曰是必橫産也手足見乎夫答曰手已及膊者三日子曰然則兒已死矣為出之其婦得全一婦産後發狂子診之臍下左方有塊大如瓜與以折衝飲又作鎮亢丸服之七日而愈一婦每小解物大如臂而色槁黑出於陰下子曰是産後腸脫不復耳用麻線系托而墮一婦産後胞衣已下有物如指長可一尺家人怪問之於子子云必是子膜遺也試開之當展而大乃是也及引出之果如其言凡子膜廣率一尺一婦臨月嘔吐不止請子為之且托以坐草子先與以伏龍肝汁而不復嘔因論曰治已晚矣臨月之病産後四五日必劇發難以救矣使吾治其産也請不知其他也及八日而娩其後四日果發嘔不止而死一婦人産後陰脫醫以礬石湯洗之而堅子曰是不可救縱能復之凝固已甚必大痛而死而以其家人強請強為收之然終不得融解而次日死格所素識一婦産後十五日晡食罷起更衣還入室而卒昏倒右瘛左瘲而搐掉不止醫與以人參湯益甚余與子往子為按蹻俄靜而鼾寐作虎翼飲與之則醒而起坐子因又命余作正方第一劑臨歸囑之其家人曰湧痰尚盛夜半應吐吐則與虎翼飲已則復與此湯已歸夜半果吐家人如其言後十四五日而愈一婦孕八月指頭腫大出血不絶子曰便結而熱因動絡脈絡脈大傷則出血不絶與以折衝飲而愈一婦子癇愈後五日因卒倒折前齒遂成不語既娩猶不能言引子治之先與以折衝飲盡其惡露三日更與正方第三之劑出入二旬而能言語一婦産後十五日陰中忽生一小肉柱左右相連小便分飛不可坐桶以指撼之唯覺兩邊之攣急耳子誨以麻線系托其中三日而斷五日而愈一貴人寵姬産後病腹中大急數十年已又小便閉諸藥無效因延子治之子云是血瘕梗於便道也其根既結未可遽治今且治其便閉而可也因請姬前坐溺器教諸侍從其背後兩手捧其腴而舉起便即時大通如瀉於是以他不急患也謝子罷一婦臨産兒露臂不縮八日而妄見譫語四肢厥冷脈細微子往為出其兒且度遽下其胞則死矣徐徐下之乃得不死矣一婦臨産甚艱兒遂死子往為出之其兒右足偏大如柱一婦艱産探之得兒頭斜冒子宮而出於橫骨下子謝是不可救遂死一婦艱産探之得兒之背子云兒已死為出之其母因得不死一婦艱産兒腰已下不能出也子曰兒死矣且其腰偏大故不出耳為出之亦得不死一婦艱産三日子曰胎臭甚子已死於腹中矣其頭顱必已三折骨理然也及出之果如其言一婦年四十有二産後百日余通身腫滿二便俱塞醫不能料子作龍翔加芩連飲服之數劑而愈後復孕及五月復病腫其姑耄而囂日罵之曰孕而病不如無孕而死子笑解之曰嫗休怒五日之後勿藥矣乃與前方兼朱明丸五日而症全退姑歡謝曰苟如此雖歲育可也一婦年三十有二始孕患大便澀結産後三日適聞主母喪痛哭已經宿眼眶突腫者寸許脈浮而數子曰此火症也乃用熊膽黃蘗辰砂水浸洗其眼數次眶始斂後尚出膿二年而瘥一婦因倒産兒頤拒於交骨免甚艱産後便道不通者三十日子曰此胞宮遏腸也不治自安後果自復一婦三孕皆不能育尋孕十月迎子診之子診其腹曰是䐃在左腹下故常害其胎使不育也雖然使余治可無傷乃日往其家為之按蹻既免子因又謂其婦曰夫䐃者每孕而肥今而不治恐後有孕至於命也然而欲治之則痛且甚恐中而廢如何其姑與婦皆聞其言始大懼誓忍痛而治乃與折衝飲其夕果大痛不可忍比明下一物視之大二寸許剖之理如鰍肉其外白膜包之然以其自分裂而下而其餘尚在腹中因又勸之益服前湯及其日晡乃下其半次後竟舉二子矣一婦孕七月清穀下利煩渴又甚飲水日二三升子診之脈沉細與以加澤瀉第三和劑兼用青陽丸曰大便色黑則下利自止既如其言一婦臨産兒手足交見子曰是雙胎皆已死也為出之果如其言一婦産後八日大便燥結竟成半身不遂子與加羌活當歸正方第三之劑十四五日全愈一富商妻年三十懷孕九月患裡急後重既免嘔大發瘀滯不下四日迎子子至則衆醫在産室子獨在後堂未入聞其嘔聲謂人曰此敗血攻肝之聲也不急止之則難活矣少頃主人見謝曰産婦羞不欲見生面人強之恐血氣逆上請先生莫怪子因問衆醫用參邪答曰用已四兩子大息曰噫汝婦死醫手矣尚羞人邪因謝去其明日而婦死一婦已娩四日浴後忽發熱遍身生紫斑其家急遣人迎子子因問曰無斑成赤而脈已細邪其人無作讝與答曰皆未也然則尚可救矣因急為趨其家以口含冷水數噀其體婦發寒戰甚熱退斑沒次日全瘥一婦年十七已嫁始孕因歸産於父母家家農而富居在田間婦已産一日發熱時作讝語因急迓子子已往則其産室頗深而遊障之間對設曲屏風凡三折而後入其室室中晝張鐙會天寒置火爐五枚婦坐産椅被覆周圍裁見其頭子已診畢因笑謂其人曰婦本不病父母愛護太過而因致此症耳且女幼而慣田野今雖新産豈可郁屈如此乎於是盡命開室戶而火爐及鐙屏皆徹焉扶婦去椅而寢之蓐上與以正方第八劑盡三貼而全愈一婦臨産九日不能免已而鼻尖與手足指二節皆黑醫多與人參無效於是喘絶二日而迎子請曰願令分娩後葬焉子曰脈雖微尚存矣此陽氣不運死血聚耳實未死矣因為出其胎更作正方第一劑藥粥兼進一時許脈復乃復為下胞衣次後十二日尚時發血暈子旦夕視之遂愈但瘥後其黑處皆墜去一婦子癇日發三五次劇則二十次至為右瘛子診之曰病得之交接壓其胎即為按蹻而止不復發一婦産後一歲許卒然崩漏昏倒其家迎子未至有一醫與以三黃湯而兩脈竟絶後至則其家人皆已環之泣哭而子視其承泣色尚赤子意其尚可救也試以指推之承泣血色尚動因又循其腹臍下獨熱大如碗即徐為之易其席而改寢焉急作正方第六劑飲之少之大吐因復與以獨參湯而尚欲吐乃更作虎翼飲與之於是始靜稍能語後十四五日調理之而全愈一婦初産腸脫尋而孕其腸數出已而及産後遂大脫其物大如盤而灰黑色水漿實中而甚堅子為納之三日而能起步矣一婦臨産燥屎梗於産道不得出子命坐婆急以膏塗手探肛門捫而出之已娩後以綿蘸膏納之肛門三日其痛全已一婦孕子為治其産已娩而蓐子欲使臥而其家不肯因姑令跪坐而血山卒崩子急救之已不及矣子每悔之曰時不強使臥也一婦懷孕九月患右足攣急有一外科傅以膏益甚子為按蹻立愈一婦産後六日子固戒其浴而其家不肯至晡竊浴之夜半發熱紫斑遍體且讝語始大驚迎子子至見之怒曰自招其斃非吾所知也且此必不可救至明則必死因謝去其明日死一婦産後腹滿如水腫狀臍下時痛醫皆以為瘀血頻與以破血之劑益甚子曰是腸癰也針之則膿血激射出三升余因作第三和劑加土茯苓飲之且針且藥十五日而愈一富商婦年四十三始孕已八月患水腫子治之與以正方第三劑加豬苓澤瀉而愈其彌月有一坐婆診婦而語家人曰夫人年長往病水腫時醫又治用峻劑故今其胎已死吾恐分娩之失夫人也家人聞之驚惕相哭注適子往到其家按蹻其婦衆因相訴以其故子聞之因召其家人之嘗乳者為引其手捫婦之孕且問曰汝嘗知孕矣是兒臂也死胎亦動若是邪於是家人疑者皆釋後四日而娩母子畢皆無恙矣一醫家女妊身七月夫家來在其家一日朝梳髮後卒然悶倒其家急迎子而子至為之按蹻則醒因設臥蓐使女寢既且歸戒其家曰必無使之起坐則必復發而其家人心疑子之言且恐有痰血也歸後使起坐則果復悶倒然初以其所背而不敢迎頻灌以參連晡至夜半殊無效應卒不得已復遣人迎子子聞料其背言也惡之不肯往其家人惶急往來且謝且求子遂不得已而詣其家復為按蹻則亦醒因復更命就蓐而臥焉子因問其女曰腹無氣痛否女曰有之矣子曰然吾知之矣明日夜半必當半産乃復戒其家曰必無使之起坐如猶有背産後復發則雖扁倉難以救矣其家始懼不敢復為於是暈遂止而明日夜半果半産矣一婦産後二十日患肩脅掣痛為之不能食子診之脈數甚因問曰左右痛孰甚婦答曰右甚於左子曰然則腰亦痛乎婦曰腰痛則自産後有之每臥起甚艱子乃按蹻腹痛頓止因與朱明丸百粒以龍騰飲夜半下之且曰明日巳刻大便得通矣婦從其言服之明巳刻果下燥屎而掣痛頓除子曰左甚者難治一倡未齓有一惡少強與交其女未感而孕子聞曰女氣不感男精獨結其或男既産果如其言一婦産後胞衣不下有一婦人科十日治之而其術方窮適其族勸迎子子往則其醫在焉子因與論曰胞久不出恐其已爛不急下之尋必致死醫素忌其能抗言曰三世之醫亦有所傳已君不必獨善也子因謝去其明日婦果死一女已約嫁數日忽腹脹乳出夫家疑其奸責其父母其女亦日夜憂欲自死子為診而決之曰是處子也因與以折衝飲三日經行而腹脹頓已先生近江彥根三浦氏之族也父諱長富家世祿仕於侯藩長富取妾而生先生年七歲以其庶子出之養於外家既孤其家遂請為己子而教以稼穡之事先生則少而厭農遂去客京師而其幼時本嘗學針砭按蹻頗通其微及其客京師因復益治湯劑之方學甚勵苦居數年適其鄰居有一婦臨産兒露手膊而將死先生因視而閔之乃歸為構思其治之術其夕得之明日遂往以救之婦得不死於是益為其術大治産婦日數百人凡世醫所難先生無不治治皆無不全矣而竟以此顯名京師茲述産論時年六十有七云
