body:
  text: 卷三已娩一諸論論曰俗斷臍帶必先急系之以物墜住蓋恐其或上衝也殊不知胞衣本自無上衝之理也莫為是拘拘者而可也又屬臍僅留三四寸斷之可也胞衣小者五寸大者八寸孿胎者一尺又余嘗見其堅如石者焉胞衣夏月經一日輒糜爛如冬月者耐二日但二三日不得下者雖稍糜爛尚無甚害過此則必須用手法下之不然貽禍不小也矣凡胞衣不下而醫為下之者其按腹之法但當自其小腹按摩之而切勿按其前腹如誤按前腹者則愈按愈縮而肚帶之斷余恐復盡入腹中矣子既下而胞衣尚在腹內者其衣附蒂之處猶反向上胞衣依附子宮裡最高處下之自有法不知者妄摩其腹則愈摩愈入終不能下此不可不知也凡産後三日必用折衝飲而無拘諸外症與虛實焉惡露未盡者百患立生危斃可待也慎之慎之腸脫已收後欲小便者必須用綿衣抵承而使溺其上也又宜分開兩踵出尻外而坐不然恐復出也用第一和劑調理之可也産後發血暈者率以分娩後輒起步自動其委食之府而瘀血之氣挾之上逼心下爾不為輒起行者血暈莫發矣不可不知也俗習産後防風冷甚嚴其愚謹者至有塞隙墐牖者往往見人家産後戶牖密閉中多設火爐以烈焰逼蒸遂使産婦血氣逆煽而致弗救者不可不以為戒也産婦唯不可令其下身當風耳其他居處飲食一從其平日而可也産後當禁白梅黑豆蓋白梅酸收恐使惡露難下也黑豆之性能消藥氣恐服湯無效也凡産婦分娩後切無使起步又切無用産椅當倚蓐高枕而右側臥則新産後可以保無不虞之憂矣難産而醫為救免之者蓐臥半時許率多振身發熱而氣急無懼也不血暈故振身而氣急也多與參附故發熱也凡産後用藥勿用香竄之劑以其血弱易奪也難産而醫為救免之者子已出後當須候産母氣息已定然後更下其胞衣恐使母氣暴索也産後乳汁不出者必待三十日而乳出焉蓋舊瘀已盡而新血行也産後十四五日當忌浴蓋新産惡露未盡血氣又虛而浴則腠理大開虛邪必襲至與瘀血熱氣相搏則其生禍害決非淺淺也矣多見人家守俗習陋規産後六日鹽湯浴之浴後冒衣令汗大出由是平穩之産婦忽變成發狂讝語若大熱發斑等惡症或遂致虛羸不起之病者生平所見者不可勝舉矣故余當治産婦他一切禁忌皆無所拘而獨於沐浴嚴加禁防者為之也産後八日當厚被覆下身以熱湯濡巾盡拭去其汙痕畢後又脫上體別拭之則身得清潔功與浴同而賊風無所乘襲矣蓐勞有二種一屬虛證一屬瘀血必十日後發其病頭痛發熱而咳身體無所不惡其善食而乳出濃汁者為血虛如瘀血則血氣上逆其人不食少乳産後十七八月法當無經行而其經將先期者其乳汁必濃其七八月偶見者多房而動其血也世醫或論血入衣中張大不能下者妄矣胞衣雖在腹中亦必自縮小不能張大矣其不能下者常束鎮帶制之令然焉産後亦當必禁帶而使勿用也二治法病候曰胞衣未下而血暈者測法曰難治者十居五六治法曰先治血暈後下其胞衣但暈發已過二時者死禁暈之術見後病候曰産婦不起則不血暈而今雖不起而發血暈者測法曰血熱盛而搏也治法曰禁暈之術主之與以折衝飲方見前病候曰産後顛狂測法曰敗血上衝也治法曰鎮亢丸主之鎮亢丸方水銀黑錫辰砂各十錢上三味以柳木片攪之於鐵盆中而以不見星為度糊丸先以夜寅刻分服其半不已則次日寅刻與之病候曰産後譫語發斑測法曰得之新産未逾七日而浴浴後大取其汗也治法曰噀冷水於其面與以洞當飲渴者加麥門冬栝蔞根當自清解如虛者必死洞當飲方見前病候曰産後寒戰咬牙者測法曰瘀血也治法曰折衝飲主之方見前病候曰産後血暈測法曰其面俯如欲眠而不覺者元氣虛乏也其仰者血熱氣與食谷相搏也治法曰禁暈之術主之虛乏者速禁之則生如禁遲而數發者難治禁暈之術見後病候曰産後崩漏測法曰其人營氣不能養血者而産後起坐故崩下也治法曰遏崩之術主之術見後病候曰産後胞衣雖下而瘀血不下者測法曰血氣熱而結也治法曰折衝飲主之方見前病候曰産後兒枕痛測法曰痛在右腹者為兒枕痛治法曰産後輒痛者為瘀血其痛有時起止若作陳疼者折衝飲主之産後二三日而其痛發者為大便燥結問之果信與朱明丸當令病人右臥病候曰産後胞衣不下二三日者測法曰婦本虛乏因産益甚者則不能下也治法曰誤急下之則死治法先使婦高枕安臥按臍下動脈應微弱且先安其胞無欲下之當先頻與牛膝附子類一時許脈覺有力乃下其胞可也病候曰産後發熱煩渴測法曰得之産後數浴下身浴後受寒冷也治法曰洞當飲主之方見前病候曰虛汗不止若自汗盜汗者治法曰順血則愈第三和劑湯類主之病候曰産後遍身痛有熱痛疼痛癢痛者測法曰熱者屬血疼者屬寒癢者屬氣治法曰熱者下之折衝飲主之疼者溫之第四和劑湯主之癢者行之第三和劑湯主之各方見前病候曰産後兩脅痛或腹痛作陳疼者測法曰或大便燥結也如産後二三日後大便快通瘀血亦下而腹痛者陽脫而虛矣難治病候曰産後臍下急痛者測法曰氣血並虛難治又有因惡露凝結者病候曰産後痿躄測法曰得之産後血氣未調強令跪坐産椅也治法曰第七和劑湯主之第七和劑湯方當歸乾地黃各一錢芍藥一錢芎藭五分牛膝杜仲各一錢上六味以水二合半煎取一合半病候曰産後小便不通測法曰其子宮腫因致此者其子宮腫者以其艱産受傷故也治法曰泄閉之術主之玄英折衝之類選用病候曰産後乳少或止測法曰其人本有蓄血也治法曰先用折衝飲下蓄血後與乳生湯折衝飲方見前乳生湯方白朮芍藥當歸芎藭茯苓桂枝杜仲乳香各一錢甘草一分上九味以水二合半煎取一合半病候曰産門不閉測法曰難産氣虛下部失守也治法曰當令斂足仰臥四五日自復病候曰産後肛門脫而不收者治法曰收肛之術主之術見後病候曰産後泄瀉者必腫滿治法曰第三和劑加豬澤與之別以青陽丸三兩一晝夜服之各方見前病候曰産後便閉治法曰朱明丸主之方見前病候曰妊婦病水腫者産後必無血暈其胸已上有腫者為逆水腹已下有腫者為下水逆水分娩必輒死下水産後發喘急者難治病候曰産後頭痛測法曰或脾胃虛或大便燥結隨症治之病候曰産後怔忡測法曰血氣方虛有觸驚恐故病怔忡治法曰八物湯主之八物湯方人參白朮當歸茯苓乾地黃芎藭芍藥各一錢甘草五分上八味以水二合半煎取一合半病候曰産後遇經行發狂者測法曰産後十七八月法當無經行而今有之者是汙熱煽動而血妄行故又發狂也治法曰鎮亢若三黃加辰砂有瘀血者折衝飲病候曰産後瘛瘲者必經七八日而發測法曰病得之強令坐産椅也病候曰産後喘急測法曰或大便結故也不大便結者死治法曰大便結者朱明丸主之方見前病候曰産後搐搦上竄測法曰血氣上逆也治法曰龍翔飲抽刀散類選用病候曰産後中風若傷寒測法曰營衛失調也又有因瘀血與燥屎者治法曰第四和劑湯或折衝飲朱明丸選用病候曰産後腹滿測法曰大便祕結者其腫先發於腹部也治法曰先用朱明丸下燥屎後第四和劑加湯豬澤湯主之各方見前病候曰産後不語者經日自復三治術治術曰産後之治不慎擇其宜則亦百患之所由生也其術云一曰鉤胞二曰禁暈三曰遏崩四曰納腸五曰收宮六曰復肛其一鉤胞曰凡胞衣難下者有二其一由産婦元氣血虛弱既免子胎則真氣衰憊不復鼓作故不能下胞衣也其一産婦雖本壯實不幸遇産難努力極苦命垂將斃醫為救之才脫死塗則神氣昏困體皆委頓不足復振而不能下胞衣也凡遇此類當先審診其脈脈微細者次未得下之手足厥冷者亦然當與之以參附之類脈已復手足溫則下之若誤急下之則必死但其下之之術頗極神奧而非筆墨之所能盡故此不能録也雖然世間産婦以胞衣不下遂致危斃者十常居四五苟非識此術豈足專治産婦而回之末路哉於戲余欲傳之而如此非筆墨之所能盡者何幸有神解者請留意是言而無使湮微焉是吾所望後來之君子者爾其二禁暈曰産婦發昏暈者亦有三其一其人氣血俱虛産後大氣已轉成亢炎之勢因挾腸胃汙穢而上升胃脘為之塞閉不通因昏沉不省人事者是大危之證其頭必俯如是者術能止暈而不能禁死矣其一血室素蓄鬱熱其為氣甚剽疾而遇新産腹內大空邪因乘其虛而與食谷並搏上逼心胸故發運眩如是者過二時而不治則大勢已成不得復救矣其三産婦素壯實善食而分娩之後誤信庸醫謬守陋故欲其跪坐於産椅之中而強令之興身就其處因此起步腸胃動搖筋脈相牽因致血氣擾起與食谷相搏堅結如石遂作跳動上下近胃口則發悶眩也如是暈則可手到即止焉當先為設之臥蓐多卷衣被而作之令上高而下漸低置枕焉醫捫循産婦其腹心下必有物如覆杯甚堅如石跳動以應其手此時有鎮帶則宜先解去之乃以右手外廉骨用力按住其物以左手據其婦右脅下為抵當之地而右手仍逐漸用力推迫使之歸復右邊小腹委食之本位其暈必立止止當抽去其産椅前板令産婦不動其上而引出産椅底板然後人徐與掖其坐而遷之臥蓐上令産婦仍豎右膝而傾頽仍右側而就枕臥則血暈之症必不再發矣其三遏崩曰産後暴崩其發無時或胞衣下後輒暴下或産後四五十日乃至一年後忽崩漏其狀皆里血暴泄如瀉不急遏其路則必皆立死其遏路之法凡遇暴下當投著而起急趨坐其右側傍住之急使其伸腳而以右足股間束勒其婦之腰已下使其産戶緊閉不通而無少放鬆仍急澆獨參湯因令高枕而右側臥尚可得救之若小遲緩則不可復救矣故人家有産婦者切勿用産椅偶有此症以其四周有牆板難急施此法也又新産後必當即倚蓐而側臥可以無此暴崩之患也其四納腸曰凡盤腸而後娩若産後則腸脫之類並皆無不由産婆誤之強令努力也其納之之法醫先坐其婦右邊仍令婦舉兩臂嬰醫者之項後展開兩股以身擁懸而坐醫左手抱持其背右手捱産門聚束其腸置之掬上仍自振體以起作其身候其婦之因此俱起而頭仰腰伸背反腹張之時以右手一送即時得斂去如其積年不能收已稿黑乾涸者以麻糸系托之即經日自落下亦無所傷此亦不可不知也其五斂宮曰産後子宮突出不斂者其斂之之法或用納腸之法亦得斂去如未得斂去者醫卻豎左膝而坐左膝髀抵之腰後左手臂羕婦之背使其去嬰項之手作伸足而仰臥亦候其背反腹張之時右手捱産門推之一送即時得斂去子宮突出世或曰陰門突出者非也其六復肛曰婦人素患脫肛産後大出疼痛不斂者令婦人面壁柱其鼻尖與胸前骨腳指頭之所當上下均齊以抵切其壁柱而直立如産婦不能直立則使人推扶其背醫自背後雙手按臀肉包所脫之肛肉以此徐徐揉收之一盞頃乃斂此法甚妙
