body:
  text: 卷一孕育一緒論論曰婦人受孕經畢後十日之間為其候矣過此已往後經復動不能作孕也其免之期初孕者滿三百日則免如經産者二百七十五日折衷其旬而計之可以不失其大要焉矣始孕三旬則病阻蓋以後經不能行而及期病也或頭微痛或心中憒焉或解惰不欲執作至四十五日若五十日益熾其大凡其人脈數惡寒發熱頭痛口渴嘔吐咳逆上氣不食腹痛下利耳鳴煩悶或欲啖鹹酸果實多臥少起其疑似疫者當按三部而後決焉經畢後七十五日候孕與否可決凡孕者其指頭之脈或倍於寸口氣衝之脈或倍於寸口是謂三部之脈按三部而不得決者候之腹右手循鳩尾而拊而下之至於天樞左手起自橫骨之際微推而上之則臍下任脈之經豚豚然有物起其指下按之隱然有氣力焉者乃娠也凡按腹者候之肌膚之間故其手宜輕否則胎氣逃散不得見矣輕而拊下之而臍下之肌膚礙指焉者乃娠也凡孕皆在橫骨之際大抵始身過七十五日則見其大僅如獨栗子但又須兼按氣衝乃決之矣左腹下為血室右腹下為委食之府故如血塊腹脹者率居於左邊而按之或有數塊纍纍焉偶當任脈者亦切按之其物凝然膠結愈深愈固可以一按而決矣凡此所云左右分屬之說雖出於古人亦躬所實驗數治産婦事有良然故按腹右得者定為燥屎左得者定為瘀血必無不中者世當以乳頭紫黑卜之妊否然而殊有不然者嘗見一婦類孕乳頭黯色又能出汁而其實血症者故不可一例也妊娠之形類血塊腹脹者不可不審別也假如四五月不見其經者當問其經嘗多少也即曰常多者妊娠也即曰常少者又當依法按其腹按後腹形頓小者是血塊病也假如六七月不見其經者當按其腹當神闕有物應其手而橫骨之際任脈之經其膚圓軟而渾渾然切之則動氣應其指者妊娠也或雖於橫骨際已毋有而按其腹又弗覺氣力者然而氣衝之脈甚數及臍下之膚礙指焉者妊娠也假如八九月不見其經者當試令其人仰臥仍不轉側而直起座若能之者是非妊娠也凡婦人之腰形必拗曲而其內宏蓋是天設受胎之地故與男子之腰形峭直內無容受者不同古來論胎孕之狀皆以為妊娠十月子頭向上及將生則轉身而下頃余又閲紅夷所傳內景圖亦畫胎孕之形一同其說乃知傳廖誣真非特漢土也夫彌月之胎其大幾何子宮之中其寬幾何信使回轉理當破裂豈非大謬惑者與今唯據實如法按之當自知彼非是大抵五月之後腹中胎大如瓜必背面而倒首其頂當橫骨上際而居焉其胞衣則蓋於胎之尻上而當母鳩尾之下至臨月按之可得別其體貌而盡矣古人又謂其縮手足而居者亦非是也自其背而探之其左右足膝皆張而旁出則應是其面作箕股或結趺也如其手膊則並展其臂而常自依脅旁則未嘗縮手足也故生子頭上耳後橫斷紋乃橫骨當齧之痕也如逆生者其孕本亦背面而上首胞衣蓋乎兒膏肓之上故其生遂自足踵而出也蓋古時未知其胚胎之初所已倒錯也而以臨産遽變者妄論耳凡妊娠之形尖上者必逆産尖下者必順産凡所謂順逆者並皆以世所常有者謂之順反此者謂之逆也下皆仿此凡孿胎一側於左而倒首向下一側於右而豎頭向上其生也左先右後故後者必逆生其胞衣各一是為孿胎正法其奇者或駢首向下共一胞或雙皆上首共一胞胞皆大如盤是為孿孕奇法獨其雙逆胎者難達而死而罕生者凡任脈窪成一道者孿胎之候孿生或男女同孕或純男或純女余所識家每歲孕而孿生又必一男一女凡五産皆然又嘗見一婦坐草視其所下乃流産之胎如孕未足七月者而舉體尚冒膜未脫後三日還産滿月之胎而其子今尚無恙蓋天下無所不有矣凡妊娠百二十日而四肢之形具未滿者但有胞而形圓譬如獨栗子而白膜包之甚厚蓋嘗遇傷産婦墮是物者三視之其內但有五采蓋三剖皆同云由是觀之謂人非五行之秀氣者吾不信矣有品胎者余嘗見之者二人而已故其法未詳但其大略猶如孿胎之法而其所生之兒率不可育已或問男女之辨余答曰不知也問左男右女之說曰非是也凡孕皆當任而居中為物所壓則左右側其右者兒之頭居焉左者兒之下身居焉妊娠禁伸腳而寢者其意蓋恐其臥肆體則産致橫難也然檢漢人古醫籍並亡是說而雖本邦古名醫亦未聞有此議則知此言徒出近時兒女之臆見者而偶然傳承遂成是陋習者耳不然其言之害事理者亦莫甚焉何者凡孕胎必當任而居中而今屈腳而寢則肚體必曲撓內縮此為其胎難居中矣且如本邦婦人又加之以鎮帶束其上是制其上而戾其下也胎欲不欹斜豈可得乎哉故今孕婦之動致橫産者率皆夫二者之貽禍識者不可不力救辨正也妊娠禁食川鱗亦是近來始有此陋習竊繹其意蓋惡流産而忌之也夫傷産自由母氣不足與物傷其胎而有之豈川鱗之所能為乎蓋余壯及今年六十有七歲其間日治妊娠遇有此輩必強食之力為一世除之謬惑而未嘗遇所害也大抵一切禁忌未嘗非庸惑之流也凡産前多房必産後病蓐勞是為妊娠之大戒矣凡妊娠當忌屢浴則腠理開而風冷襲焉凡妊婦之受冷者浴也其他無所受邪胎氣實於中也二治法病候曰經水時下或不絶或胎動而水下或欲墜者胎失其處而動經若膀胱也至甚動經脈則寒戰發熱而胎墜測法曰病得之交接而壓其胎治法曰整胎之術主之宜第一和劑之類病候曰吐血衄血或卒然胸痛者測法曰病得之盛怒而其氣暴逆也治法曰洞當飲主之兼用童騰飲吐血甚者別與藕汁洞當飲方柴胡黃芩黃連茯苓半夏生薑青皮各五分甘草一分芍藥一錢上九味以水二合半煮取一合半服童騰飲方芎藭黃芩黃連各一錢大黃五分上以麻沸湯一合漬之須臾絞去滓頓服病候曰孕婦左腿痛測法曰有瘀血也數産而後或病於左初則不病治法曰産後療之可也折衝飲主之病候曰溲黑血測法曰溲黑者腎傷也溲血者內熱也凡諸血不由戶者不害於孕甚則危治法曰大補湯主之大補湯方黃蓍人參白朮茯苓當歸芎藭芍藥桂枝各五分乾地黃一錢甘草一分上十味以水二合半煮取一合半服病候曰藏躁悲傷者或善怒者産後不眩冒則病狂治法曰甘麥大棗湯主之方見要略病候曰苦心下逼者測法曰世醫率謂是胎也余屢驗非胎而唯血氣上逼者甚多知如胎絶橫骨而上則往往難救其得整胎而復者十僅二三而已治法曰第一和劑湯主之兼用救癇術按之而止術見後第一和劑湯方附子白朮黃蓍芍藥各一錢當歸乾薑芎藭茯苓各五分桂枝一錢甘草一分上十味以水二合半煮取一合半服病候曰妊娠下黃汁或如赤豆汁測法曰産門下之者胎死也治法曰第一和劑湯主之方見前病候曰妊娠二三月下血塊治法曰當剖視之恐是傷産也已知傷産當與折衝飲可也但下血塊者乃知非是傷産也折衝飲方芍藥桃仁桂枝各一錢紅花半錢當歸芎藭牛膝各八分牡丹皮延胡索各五分甘草一分上十味以水二合半煮取一合半服病候曰婦人每孕三四月必墮胎治法曰膠艾四物湯主之膠艾四物湯方當歸生地黃各三錢芍藥二錢芎藭一錢五分艾葉三分阿膠二錢上六味以水二合半煮取一合半服病候曰子癇測法曰其人七情鬱結過度則內火煽盛熱薰大腸怒撣憤起上動委食之府是為子癇故其病必右治法曰救癇術主之術見下病候曰過期不産者測法曰經行不來者久之而忽又受孕也病候曰心下逼而嘔吐者治法曰虎翼飲以伏龍肝汁煎服虎翼飲方半夏八錢茯苓四錢青皮一錢生薑一錢半上四味以汁二合半煮取一合半服病候曰妊娠胎動則足痛而痿測法曰妊娠過食若物壓其胎則動甚者痛痿但動未至甚者至八九月旋自止矣治法曰整胎術主之術見下病候日飲食停滯或吐或下治法曰吐則虎翼飲瀉則第三和劑湯主之虎翼飲方見前第三和劑湯方白朮黃蓍各一錢乾薑五分芍藥一錢桂枝一錢半夏一錢甘草一分茯苓五分上以八味水二合半煮取一合半去滓溫服病候曰煩燥口渴浮腫有熱而大便祕或麻痹者治法曰龍翔飲主之龍翔飲方麻黃一錢大棗一錢蒼朮一錢石膏三錢半甘草一分生薑一錢上六味以水二合半煮取一合半服病候曰孕而遺精測法曰得之子宮受寒冷也治法曰牡蠣湯主之牡蠣湯方桂枝澤瀉龍骨牡蠣各三錢甘草一分上五味㕮咀以水二合半煮取一合半服病候曰轉胞治法曰玄英湯主之玄英湯方丸則亦名玄英丸乾地黃一錢薯蕷五分茯苓一錢山茱萸三分牡丹皮三分澤瀉一錢牛膝八分車前子五分桂枝一錢附子八分上十味以水二合半煮取一合半服病候曰大便下利治法曰第四和劑湯主之兼用青陽丸第四和劑湯方附子白朮黃蓍芍藥各一錢桂枝一錢乾薑茯苓半夏各五分甘草一分上九味以水二合半煮取一合半服青陽丸方黃柏熬二兩燒二兩生二兩上一味糊丸每服一錢匕一晝夜數服以大便利黑為度而止病候曰鬼胎血塊病測法曰或在臍下之左或章門邊形類娠六七月者按之其物似有尖稜矣治法曰折衝飲主之方見前病候曰渴病難治治法曰專以天花粉與之不與他食而愈病候曰妊娠腹滿測法曰大便燥結也治法曰朱明丸主之朱明丸方蕎麥一兩大黃三兩上二味為末糊丸每服一錢病候曰妊娠腹內覺如鐘鳴測法曰大便燥結而氣逆也世蓋謂兒哭於腹中者妄矣夫兒在胎者其頭與手足皆包白膜安得作聲故其臨生也其膜內破而里漿外迸乃亦有生尚舉體被覆者而人爪其頷下之膜而發露其唇然後兒得一啼而舉體之膜自破裂而脫故兒未嘗哭於腹內也病候曰右腿痛不可忍而不能行步者測法曰胎之處偏也治法曰整胎之術主之但痛者朱明丸主之術見後方見前病候曰孕而顛仆者治法曰整胎之術主之病候曰小便澀滯者腫滿測法曰得之數浴下身而浴後溫已則塞也治法曰玄英湯主之方見前凡孕婦忌數浴浴者無久處之孕至九月法當斷浴但以熱湯濡巾拭之可也病候曰孕而淋測法曰以浴下身得之治法曰治淋醴主之兼與玄英丸方見前作醴方曲四合白砂糖一合上二味以水八合煎如飴狀一晝夜溫服病候曰孕婦頭暈甚者不治病候曰妊娠五六月傷産者其痛必自腰間八髎發而陳疼而肚下痛甚者是也病候曰熱利或水腫病其胎多墮病候曰熱病胎死於腹中者必下血病候曰妊婦遽苦腰間重若負任者胎死也病候曰時行病及其他雜病治法曰皆隨症治之用藥勿拘俗戒凡有其症者雖毒藥無傷若遲緩不治者産後三四日必復大發而不可救矣産前十日而病愈者則不再發矣三治術治術曰凡子在胎其頂當橫骨上際而倒豎而居焉而及九月也漸陷而其頭入於橫骨之中故腹橫骨之間按之而不可容指則不逾十日而免故子胎者日動月下然後就免矣若或妊婦為物所觸壓或遇他事故內受驚恐或飲食過度自動其腸胃則胎常欹側悶動而不橫産則子死於腹中矣故不可不時時按腹正其所位位常不失其正則雖至分娩之時萬無一害矣其整胎之法先使産母解帶仰臥消息半時許醫徐用兩手就之初自胸腹按摩起以次下及右邊小腹凡妊娠已五六月者其胎大已如瓜當任脈之經橫骨之際而居焉而左為血室常蓄氣血右為委食之府為空虛故胎動輒易偏右側而欹斜甚者或當得之小腹橫骨之際醫既審按以揣其胎畢膝頭據産母之左脅下以此為用力之地雙手略提其胎輕輕用力推送於任脈下之本位但孕婦有燥屎者亦須分理排定屎者當右傍背小腹之間重按之有磊塊應手者即是也須用左手沿其內邊而指頭撥之以使不蔽其胎而卻從其中間拘其胎以令內移不然則並推屎腸不成其功也推送之時用力不可粗暴作之當須臂頭重而指頭輕其右手當亦略帶按撫意務致中正為要矣已整胎畢卻自小腹拊摩回轉向腹前其中間留瓜跡大而安頓之數十回乃使産母起坐醫以右肩緊依其胸而令産母兩手緊抱醫者之頸而醫以兩膝內挾持其膝以令産母體無欹側搖動而後卻用兩手指頭微用力挾脊骨循之自第七八推而按抑而下就其按下之勢使指骨節間有聲務以使産母轉其志意向背後為之者一再次卻下用其掌側骨緊切相依仍用力拘勒自背後腰眼向小腹之前使相聚而回轉為之者五六十次卻又用其掌側骨附産母臀尻圜轉撫摩者數回至左右兩髀而止凡産母用此法按之者腹內鬱氣大開絡脈自理而所孕之胎亦自安其位矣苟能使子母任督常不相離則胞胎寧固而臨産可以保免於橫礙之難矣大抵子胎常自有包膜護之而橫骨常亦津液濡潤雖乃用力推送決無所害傷請勿以此類而生顧忌之心也妊娠五六月每旦作之不懈者母子肥健長無殤折之憂家世奕續永膺無疆之福矣凡救子癇須急如奉漏沃燋不則死矣其狀大類癲而發狂瘈瘲者是也其救法先使其婦仰臥而醫以右膝臏抵於婦人左腹季肋以此為其用力之地卻以右手上推右不容冗左手下按右章門冗乃其手下必應有物如巨柱憤動掀起用力按之則止矣
